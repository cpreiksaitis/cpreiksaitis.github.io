rtnerships — meet your data analysts, learn what tables are available. Upskill yourself or find a collaborator — basic SQL, data visualization literacy.", "Phase 3: DESIGN WITH INTENTION. Build a data dictionary — define every metric precisely. \"Patients per hour\" means five different things without one. Counterbalance everything — never present speed or volume without acuity and quality safeguards. And start small — one metric, one cohort, one quarter. Prove value before you scale.", "Phase 4: CLOSE THE FEEDBACK LOOP. Data without coaching is just surveillance. Decide who delivers data to residents, how often, and in what context. Clarify formative vs. summative use upfront — residents disengage from monitoring, they engage with coaching. And for every metric, answer the \"so what?\" — if a resident's number is low, what should they actually do differently?", "Phase 5: SUSTAIN AND SCALE. Document your pipeline — queries, data sources, refresh cadence — so it survives personnel turnover. Connect metrics to existing structures — CCC, milestone reviews, coaching conversations — not a parallel system. Align with the bigger picture — institutional priorities, national CBME initiatives, and the UME-GME-CME continuum. And share definitions across institutions — standardized metrics enable multi-site benchmarking."]}}];
const TOTAL = 31;
let idx = 0;

function renderNotes(notes) {
  if (notes.type === 'prose') {
    return notes.paragraphs.map(p => '<p>' + escapeHtml(p) + '</p>').join('');
  }
  if (notes.type === 'list') {
    return '<ul>' + notes.items.map(i => '<li>' + escapeHtml(i) + '</li>').join('') + '</ul>';
  }
  if (notes.type === 'phases') {
    return notes.items.map(item => {
      const dotIdx = item.indexOf('.');
      let header = item, body = '';
      if (dotIdx > -1 && dotIdx < 35) {
        header = item.slice(0, dotIdx);
        body = item.slice(dotIdx + 1).trim();
      }
      return '<div class="phase"><div class="phase-header">' + escapeHtml(header) + '</div><div class="phase-body">' + escapeHtml(body) + '</div></div>';
    }).join('');
  }
  return '';
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const s = SLIDES[idx];
  document.getElementById('slideNum').textContent = s.num;
  document.getElementById('progressFill').style.width = ((s.num / TOTAL) * 100) + '%';
  document.getElementById('content').innerHTML =
    '<img class="thumb" id="thumb" src="' + s.img + '" alt="Slide ' + s.num + '">' +
    '<h1 class="title">' + escapeHtml(s.title) + '</h1>' +
    '<div class="notes-card"><div class="notes-label">Speaker Notes</div>' +
    '<div class="notes">' + renderNotes(s.notes) + '</div></div>';

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === SLIDES.length - 1;
  document.getElementById('content').scrollTop = 0;

  document.getElementById('thumb').addEventListener('click', () => {
    const t = document.getElementById('thumb');
    const o = document.getElementById('thumbOverlay');
    t.classList.toggle('expanded');
    o.classList.toggle('active');
  });
  document.getElementById('thumbOverlay').addEventListener('click', () => {
    document.getElementById('thumb').classList.remove('expanded');
    document.getElementById('thumbOverlay').classList.remove('active');
  });

  // Save position
  try { localStorage.setItem('saem_slide_idx', idx); } catch(e) {}
}

function go(delta) {
  const ni = idx + delta;
  if (ni < 0 || ni >= SLIDES.length) return;
  idx = ni;
  render();
}

document.getElementById('prevBtn').addEventListener('click', () => go(-1));
document.getElementById('nextBtn').addEventListener('click', () => go(1));

// Jump sheet
const jumpBtn = document.getElementById('jumpBtn');
const jumpSheet = document.getElementById('jumpSheet');
const jumpList = document.getElementById('jumpList');
jumpBtn.addEventListener('click', () => {
  jumpList.innerHTML = SLIDES.map((s, i) =>
    '<button class="jump-item' + (i === idx ? ' current' : '') + '" data-i="' + i + '">' +
    '<span class="n">' + s.num + '</span>' + escapeHtml(s.title) + '</button>'
  ).join('');
  jumpList.querySelectorAll('.jump-item').forEach(b => {
    b.addEventListener('click', () => {
      idx = parseInt(b.dataset.i);
      render();
      jumpSheet.classList.remove('active');
    });
  });
  jumpSheet.classList.add('active');
});
jumpSheet.addEventListener('click', (e) => {
  if (e.target === jumpSheet) jumpSheet.classList.remove('active');
});

// Swipe navigation
let touchX = null, touchY = null;
document.addEventListener('touchstart', (e) => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', (e) => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    go(dx < 0 ? 1 : -1);
  }
  touchX = touchY = null;
}, {passive: true});

// Keep screen awake while presenting
if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').catch(() => {});
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      navigator.wakeLock.request('screen').catch(() => {});
    }
  });
}

// Restore last position
try {
  const saved = parseInt(localStorage.getItem('saem_slide_idx'));
  if (!isNaN(saved) && saved >= 0 && saved < SLIDES.length) idx = saved;
} catch(e) {}

render();
</script>
